<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- ADAM governance core: a central node with orbiting agents -->
  <rect width="32" height="32" rx="7" fill="#07090C"/>
  <!-- orbit ring -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#2DD4BF" stroke-opacity="0.35" stroke-width="1.25"/>
  <!-- agent nodes around the core -->
  <circle cx="16" cy="6.5" r="1.9" fill="#5EEAD4"/>
  <circle cx="24.4" cy="11.2" r="1.9" fill="#5EEAD4"/>
  <circle cx="24.4" cy="20.8" r="1.9" fill="#5EEAD4"/>
  <circle cx="16" cy="25.5" r="1.9" fill="#5EEAD4"/>
  <circle cx="7.6" cy="20.8" r="1.9" fill="#5EEAD4"/>
  <circle cx="7.6" cy="11.2" r="1.9" fill="#5EEAD4"/>
  <!-- governance core -->
  <circle cx="16" cy="16" r="4.2" fill="#5EEAD4"/>
  <circle cx="16" cy="16" r="2.0" fill="#07090C"/>
</svg>
